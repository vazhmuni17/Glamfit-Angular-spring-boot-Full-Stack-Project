<section
  class="relative"
  #testimonialSection
  [class.testimonial-visible]="isVisible"
>

  <!-- Top Brown Area -->
  <div class="bg-[#6A4A3A] pt-20 pb-40 text-center testimonial-header">
    <h2 class="text-3xl md:text-4xl font-serif text-[#E7C873] mb-2">
      Testimonials
    </h2>
    <p class="text-[#E7C873] text-sm">
      Short quotes from happy clients
    </p>
  </div>

  <!-- Bottom Light Area -->
  <div class="bg-[#D9D9D9] h-64"></div>

  <!-- Testimonial Card -->
  <div
    class="
      absolute left-1/2 top-40
      -translate-x-1/2
      bg-white
      max-w-4xl w-[90%]
      rounded-lg shadow-xl
      px-6 md:px-12 py-10
      testimonial-card
    "
  >

    <!-- Quote Icons -->
    <span class="absolute -top-8 left-6 text-7xl text-[#E7C873]">“</span>
    <span class="absolute -bottom-10 right-6 text-7xl text-[#E7C873]">”</span>

    <div class="flex flex-col md:flex-row items-center gap-8">

      <!-- Avatars -->
      <div class="flex md:flex-col gap-4 testimonial-avatars">
        <img src="assets/home-slide/home1.jpg" class="w-16 h-16 rounded-full object-cover">
        <img src="assets/home-slide/home2.jpg" class="w-20 h-20 rounded-full object-cover border-4 border-white shadow-md">
        <img src="assets/home-slide/home3.jpeg" class="w-16 h-16 rounded-full object-cover">
      </div>

      <!-- Content -->
      <div class="text-center md:text-left testimonial-content">
        <h4 class="font-semibold text-[#6A4A3A]">
          ACHU G
          <span class="text-gray-400 font-normal text-sm">
            &nbsp;Happy client
          </span>
        </h4>

        <p class="text-gray-600 text-sm leading-relaxed mt-4 max-w-xl">
          I had a wonderful experience at GlamFit Aesthetics & Beauty Lounge
          yesterday! I went for a skin lightening and brightening facial and
          it was truly relaxing and refreshing.
        </p>
      </div>

    </div>
  </div>

</section>
