<!-- service-section.html with animation classes -->
<section
  class="bg-gray-100 py-16 pt-40"
  #revealSection
  [class.reveal-active]="isVisible"
>

  <!-- Heading area -->
  <div class="flex justify-center relative h-50 reveal">
    <img
      src="logo/logo1.png"
      class="h-70 opacity-0 absolute bottom-7 reveal"
    />

    <div class="text-center max-w-3xl mx-auto mb-14 px-4 reveal-img">
      <h2 class="text-3xl md:text-4xl font-serif text-[#5B3D2D] mb-4">
        Transforming beauty<br />Transforming you
      </h2>
      

      <p class="text-gray-600 text-sm md:text-base leading-relaxed mt-14">
        Grace begins within and grows beyond what eyes can see.
        Confidence blossoms where self-love takes gentle root.
        Every change reveals the strength you always held inside.
        True beauty transforms soft, steady, and everlasting.
      </p>
      
    </div>
  </div>

  <!-- Cards -->
  <div class="max-w-7xl mx-auto px-6 mt-12 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 mt-30 reveal">

    <!-- Card 1 -->
    <div #serviceCard class="group relative overflow-hidden rounded-lg shadow-lg service-card">
      <img #cardImage src="assets/home-carts/beauty.jpg"
           class="w-full h-72 object-cover group-hover:scale-110 transition duration-500 card-image">

      <div class="absolute bottom-0 left-0 right-0 bg-black/40 p-4 flex items-center gap-3">
        <div class="bg-white p-2 rounded">
          <img src="assets/home-carts-icon/comb.svg" class="w-8">
        </div>
        <span class="text-white font-semibold tracking-wide">Beauty</span>
      </div>
    </div>

    <!-- Card 2 -->
    <div #serviceCard class="group relative overflow-hidden rounded-lg shadow-lg service-card ">
      <img #cardImage src="assets/home-carts/model-1.jpg"
           class="w-full h-72 object-cover group-hover:scale-110 transition duration-500 card-image">

      <div class="absolute bottom-0 left-0 right-0 bg-black/40 p-4 flex items-center gap-3">
        <div class="bg-white p-2 rounded">
          <img src="assets/home-carts-icon/makeup.svg" class="w-8">
        </div>
        <span class="text-white font-semibold tracking-wide">Make Up</span>
      </div>
    </div>

    <!-- Card 3 -->
    <div #serviceCard class="group relative overflow-hidden rounded-lg shadow-lg service-card">
      <img #cardImage src="assets/home-carts/nail-care.jpg"
           class="w-full h-72 object-cover group-hover:scale-110 transition duration-500 card-image">

      <div class="absolute bottom-0 left-0 right-0 bg-black/40 p-4 flex items-center gap-3">
        <div class="bg-white p-2 rounded">
          <img src="assets/home-carts-icon/nail.svg" class="w-8">
        </div>
        <span class="text-white font-semibold tracking-wide">Nail Art</span>
      </div>
    </div>

    <!-- Card 4 -->
    <div #serviceCard class="group relative overflow-hidden rounded-lg shadow-lg service-card">
      <img #cardImage src="assets/home-carts/asthetic.jpg"
           class="w-full h-72 object-cover group-hover:scale-110 transition duration-500 card-image">

      <div class="absolute bottom-0 left-0 right-0 bg-black/40 p-4 flex items-center gap-3">
        <div class="bg-white p-2 rounded">
          <img src="assets/home-carts-icon/aesthetic.svg" class="w-8">
        </div>
        <span class="text-white font-semibold tracking-wide">Aesthetic</span>
      </div>
    </div>

  </div>

</section>
