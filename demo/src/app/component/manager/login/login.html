<div class="min-h-screen flex items-center justify-center bg-brand-cream py-12 px-4 sm:px-6 lg:px-8 relative overflow-hidden">
  
  <!-- Decorative background elements -->
  <div class="absolute top-0 left-0 w-96 h-96 bg-brand-gold/10 rounded-full -translate-x-1/2 -translate-y-1/2 blur-3xl"></div>
  <div class="absolute bottom-0 right-0 w-96 h-96 bg-brand-chocolate/5 rounded-full translate-x-1/2 translate-y-1/2 blur-3xl"></div>

  <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-3xl shadow-2xl relative z-10 border border-brand-gold/20">
    <div class="text-center">
      <img class="mx-auto h-28 w-auto mb-2" src="logo/logo1.png" alt="Glamfit Logo">
      <h2 class="mt-6 text-3xl font-heading font-bold text-brand-chocolate">Manager Access</h2>
      <p class="mt-2 text-sm text-gray-500 font-body">Please enter your credentials to login</p>
    </div>

    <form class="mt-8 space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="rounded-md space-y-4">
        <div>
          <label for="email-address" class="block text-sm font-medium text-gray-700">Email address</label>
          <input id="email-address" name="email" type="email" formControlName="email" required 
            class="appearance-none relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-xl focus:outline-none focus:ring-brand-gold focus:border-brand-gold focus:z-10 sm:text-sm mt-1" 
            placeholder="manager@glamfit.com">
          <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid" class="text-red-500 text-xs mt-1">
            <span *ngIf="loginForm.get('email')?.errors?.['required']">Email is required</span>
            <span *ngIf="loginForm.get('email')?.errors?.['email']">Please enter a valid email</span>
          </div>
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
          <input id="password" name="password" type="password" formControlName="password" required 
            class="appearance-none relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-xl focus:outline-none focus:ring-brand-gold focus:border-brand-gold focus:z-10 sm:text-sm mt-1" 
            placeholder="••••••••">
          <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" class="text-red-500 text-xs mt-1">
            <span *ngIf="loginForm.get('password')?.errors?.['required']">Password is required</span>
            <span *ngIf="loginForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters</span>
          </div>
        </div>
      </div>

      <div *ngIf="error" class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl text-sm text-center animate-pulse">
        {{ error }}
      </div>

      <div>
        <button type="submit" [disabled]="loginForm.invalid || loading"
          class="group relative w-full flex justify-center py-4 px-4 border border-transparent text-sm font-bold rounded-xl text-brand-gold bg-brand-chocolate hover:bg-brand-brown focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-gold transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed uppercase tracking-widest shadow-lg">
          <span class="absolute left-0 inset-y-0 flex items-center pl-3" *ngIf="loading">
            <svg class="animate-spin h-5 w-5 text-brand-gold" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          </span>
          {{ loading ? 'Signing in...' : 'Sign in' }}
        </button>
      </div>
    </form>
    
    <div class="text-center mt-4">
      <a href="/home" class="text-xs text-brand-brown hover:text-brand-gold transition duration-300">Return to Website</a>
    </div>
  </div>
</div>
