<div class="p-6">
  <div class="flex justify-between items-center mb-8">
    <h2 class="text-3xl font-bold text-gray-800">Our Artistry & Moments</h2>
    <button (click)="isEditing = true"
      class="bg-purple-600 text-white px-6 py-2 rounded-lg hover:bg-purple-700 transition shadow-lg">
      + Add Highlight
    </button>
  </div>

  <!-- Form for Add/Edit -->
  <div *ngIf="isEditing" class="bg-white p-8 rounded-xl shadow-xl mb-10 animate__animated animate__fadeIn">
    <h3 class="text-xl font-semibold mb-6 text-gray-700">{{ currentItem.id ? 'Edit Highlight' : 'Add New Highlight' }}
    </h3>
    <form (ngSubmit)="saveItem()" #itemForm="ngForm" class="grid grid-cols-1 md:grid-cols-2 gap-8">

      <div class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-2">Title</label>
          <input type="text" [(ngModel)]="currentItem.title" name="title" required
            class="w-full px-4 py-3 rounded-lg border focus:ring-2 focus:ring-purple-400 outline-none transition">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-2">Description</label>
          <textarea [(ngModel)]="currentItem.description" name="description" rows="4"
            class="w-full px-4 py-3 rounded-lg border focus:ring-2 focus:ring-purple-400 outline-none transition"></textarea>
        </div>
      </div>

      <!-- Dual Image Uploads -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <!-- Before Image -->
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-2">Before Image</label>
          <div
            class="p-4 border-2 border-gray-300 border-dashed rounded-lg hover:border-purple-400 transition cursor-pointer relative min-h-[150px] flex items-center justify-center">
            <div *ngIf="!currentItem.beforeImage" class="text-center">
              <svg class="mx-auto h-8 w-8 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                <path
                  d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
              <label class="block mt-2 text-xs text-purple-600 font-medium cursor-pointer">
                Before...
                <input type="file" (change)="onBeforeFileSelected($event)" class="sr-only">
              </label>
            </div>
            <div *ngIf="currentItem.beforeImage" class="relative group w-full h-full">
              <img [src]="currentItem.beforeImage" class="w-full h-32 object-cover rounded-lg">
              <button type="button" (click)="currentItem.beforeImage = ''"
                class="absolute top-1 right-1 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition">×</button>
            </div>
          </div>
        </div>

        <!-- After Image -->
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-2">After Image</label>
          <div
            class="p-4 border-2 border-gray-300 border-dashed rounded-lg hover:border-green-400 transition cursor-pointer relative min-h-[150px] flex items-center justify-center">
            <div *ngIf="!currentItem.afterImage" class="text-center">
              <svg class="mx-auto h-8 w-8 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                <path
                  d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
              <label class="block mt-2 text-xs text-green-600 font-medium cursor-pointer">
                After...
                <input type="file" (change)="onAfterFileSelected($event)" class="sr-only">
              </label>
            </div>
            <div *ngIf="currentItem.afterImage" class="relative group w-full h-full">
              <img [src]="currentItem.afterImage" class="w-full h-32 object-cover rounded-lg">
              <button type="button" (click)="currentItem.afterImage = ''"
                class="absolute top-1 right-1 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition">×</button>
            </div>
          </div>
        </div>
      </div>

      <div class="flex gap-4 pt-4">
        <button type="submit" [disabled]="!itemForm.form.valid"
          class="flex-1 bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition shadow-md disabled:opacity-50">
          Save Highlight
        </button>
        <button type="button" (click)="cancelEdit()"
          class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-300 transition">
          Cancel
        </button>
      </div>

    </form>
  </div>

  <!-- Highlight List -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
    <div *ngFor="let item of galleryItems"
      class="bg-white rounded-xl shadow-md overflow-hidden hover:shadow-2xl transition duration-300 group">
      <div class="relative h-64 overflow-hidden flex">
        <!-- Before -->
        <div class="w-1/2 relative h-full">
          <img [src]="item.beforeImage"
            class="w-full h-full object-cover transition duration-500 group-hover:scale-110">
          <span
            class="absolute bottom-2 left-2 bg-black/60 text-white text-[10px] px-2 py-0.5 rounded font-bold uppercase">Before</span>
        </div>
        <!-- After -->
        <div class="w-1/2 relative h-full border-l border-white/20">
          <img [src]="item.afterImage" class="w-full h-full object-cover transition duration-500 group-hover:scale-110">
          <span
            class="absolute bottom-2 right-2 bg-brand-gold/80 text-white text-[10px] px-2 py-0.5 rounded font-bold uppercase">After</span>
        </div>
        <div
          class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-4">
          <button (click)="editItem(item)"
            class="bg-white p-3 rounded-full hover:bg-purple-50 transition text-purple-600 shadow-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
            </svg>
          </button>
          <button (click)="deleteItem(item.id!)"
            class="bg-white p-3 rounded-full hover:bg-red-50 transition text-red-600 shadow-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
          </button>
        </div>
      </div>
      <div class="p-6">
        <h4 class="text-xl font-bold text-gray-800 mb-2 truncate">{{ item.title }}</h4>
        <p class="text-gray-600 text-sm line-clamp-2">{{ item.description }}</p>
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div *ngIf="galleryItems.length === 0 && !isEditing"
    class="text-center py-20 bg-gray-50 rounded-2xl border-2 border-dashed border-gray-300">
    <div class="text-6xl mb-4 text-gray-300">✨</div>
    <h3 class="text-2xl font-semibold text-gray-500">No highlights added yet</h3>
    <button (click)="isEditing = true" class="mt-4 text-purple-600 font-semibold hover:underline">Add your first
      highlight</button>
  </div>
</div>
