<div class="max-w-4xl space-y-10 animate__animated animate__fadeIn">

  <div>
    <h1 class="text-3xl font-heading font-bold text-brand-chocolate">Account Settings</h1>
    <p class="text-gray-500 mt-1">Manage your administrator profile and security</p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">

    <!-- Profile Card -->
    <div class="lg:col-span-1 space-y-6">
      <div class="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 text-center">
        <div
          class="w-24 h-24 rounded-full bg-brand-gold/20 flex items-center justify-center text-3xl font-bold text-brand-chocolate mx-auto mb-4 border-4 border-white shadow-xl">
          {{ admin.avatar }}
        </div>
        <h3 class="text-xl font-bold text-brand-chocolate">{{ admin.name }}</h3>
        <p class="text-xs font-bold text-brand-gold uppercase tracking-widest mt-1">{{ admin.role }}</p>
        <div class="mt-6 pt-6 border-t border-gray-50 text-left space-y-4">
          <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest">Email Address</label>
            <p class="text-sm font-medium text-gray-700">{{ admin.email }}</p>
          </div>
          <div>
            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest">Access Level</label>
            <p class="text-sm font-medium text-gray-700">Full System Access</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Forms -->
    <div class="lg:col-span-2 space-y-8">

      <!-- Profile Form -->
      <div class="bg-white p-10 rounded-3xl shadow-sm border border-gray-100">
        <h3 class="text-lg font-bold text-brand-chocolate mb-8 flex items-center gap-3">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-brand-gold" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
          Edit Profile
        </h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
          <div class="col-span-2 sm:col-span-1">
            <label class="block text-xs font-bold uppercase text-gray-400 mb-2">Full Name</label>
            <input type="text" [(ngModel)]="admin.name"
              class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-gold/20 focus:border-brand-gold">
          </div>
          <div class="col-span-2 sm:col-span-1">
            <label class="block text-xs font-bold uppercase text-gray-400 mb-2">Email</label>
            <input type="email" [(ngModel)]="admin.email"
              class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-gold/20 focus:border-brand-gold">
          </div>
          <div class="col-span-2 flex items-center justify-between gap-4">
            <div class="flex-1">
              <p *ngIf="profileSuccess" class="text-green-600 text-xs font-semibold">✓ {{ profileSuccess }}</p>
              <p *ngIf="profileError" class="text-red-500 text-xs font-semibold">✗ {{ profileError }}</p>
            </div>
            <button (click)="updateProfile()"
              class="px-8 py-3 bg-brand-chocolate text-brand-gold rounded-xl font-bold shadow-lg hover:bg-brand-brown transition active:scale-95 uppercase tracking-widest text-xs">Update
              Profile</button>
          </div>
        </div>
      </div>

      <!-- Security Form -->
      <div class="bg-white p-10 rounded-3xl shadow-sm border border-gray-100">
        <h3 class="text-lg font-bold text-brand-chocolate mb-8 flex items-center gap-3">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-brand-gold" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
          Security & Password
        </h3>
        <div class="space-y-6">
          <div>
            <label class="block text-xs font-bold uppercase text-gray-400 mb-2">Current Password</label>
            <input type="password" [(ngModel)]="passwords.current" placeholder="••••••••"
              class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-gold/20 focus:border-brand-gold">
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div>
              <label class="block text-xs font-bold uppercase text-gray-400 mb-2">New Password</label>
              <input type="password" [(ngModel)]="passwords.new" placeholder="••••••••"
                class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-gold/20 focus:border-brand-gold">
            </div>
            <div>
              <label class="block text-xs font-bold uppercase text-gray-400 mb-2">Confirm New Password</label>
              <input type="password" [(ngModel)]="passwords.confirm" placeholder="••••••••"
                class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-gold/20 focus:border-brand-gold">
            </div>
          </div>
          <div class="flex items-center justify-between gap-4 pt-4">
            <div class="flex-1">
              <p *ngIf="passwordSuccess" class="text-green-600 text-xs font-semibold">✓ {{ passwordSuccess }}</p>
              <p *ngIf="passwordError" class="text-red-500 text-xs font-semibold">✗ {{ passwordError }}</p>
            </div>
            <button (click)="changePassword()"
              class="px-8 py-3 bg-brand-chocolate text-brand-gold rounded-xl font-bold shadow-lg hover:bg-brand-brown transition active:scale-95 uppercase tracking-widest text-xs">Update
              Password</button>
          </div>
        </div>
      </div>

    </div>

  </div>
</div>
