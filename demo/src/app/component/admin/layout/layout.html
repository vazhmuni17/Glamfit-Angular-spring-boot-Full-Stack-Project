<div class="flex h-screen bg-gray-50 font-body">

  <!-- Sidebar -->
  <aside [class.w-72]="isSidebarOpen" [class.w-20]="!isSidebarOpen"
    class="bg-brand-chocolate text-brand-gold transition-all duration-300 flex flex-col shadow-2xl relative z-30">

    <!-- Sidebar Header -->
    <div class="h-24 flex items-center px-6 border-b border-brand-gold/10 overflow-hidden whitespace-nowrap">
      <img src="logo/logo1.png" class="h-14 min-w-[50px] object-contain" alt="logo">
      <span *ngIf="isSidebarOpen" class="ml-4 font-heading font-bold text-xl tracking-tight">Admin Panel</span>
    </div>

    <!-- Nav Links -->
    <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-2">

      <a routerLink="/admin/dashboard" routerLinkActive="bg-brand-gold/10 text-brand-gold"
        class="flex items-center p-3 rounded-xl hover:bg-white/5 transition-all group overflow-hidden whitespace-nowrap">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 min-w-[24px]" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
        </svg>
        <span *ngIf="isSidebarOpen" class="ml-4 font-medium transition-opacity duration-300">Dashboard</span>
      </a>

      <a routerLink="/admin/users" routerLinkActive="bg-brand-gold/10 text-brand-gold"
        class="flex items-center p-3 rounded-xl hover:bg-white/5 transition-all group overflow-hidden whitespace-nowrap">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 min-w-[24px]" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        <span *ngIf="isSidebarOpen" class="ml-4 font-medium transition-opacity duration-300">Users</span>
      </a>

      <a routerLink="/admin/products" routerLinkActive="bg-brand-gold/10 text-brand-gold"
        class="flex items-center p-3 rounded-xl hover:bg-white/5 transition-all group overflow-hidden whitespace-nowrap">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 min-w-[24px]" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
        </svg>
        <span *ngIf="isSidebarOpen" class="ml-4 font-medium transition-opacity duration-300">Glamfit Plans</span>
      </a>

      <a routerLink="/admin/orders" routerLinkActive="bg-brand-gold/10 text-brand-gold"
        class="flex items-center p-3 rounded-xl hover:bg-white/5 transition-all group overflow-hidden whitespace-nowrap">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 min-w-[24px]" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
        </svg>
        <span *ngIf="isSidebarOpen" class="ml-4 font-medium transition-opacity duration-300">Bookings</span>
      </a>

      <a routerLink="/admin/gallery" routerLinkActive="bg-brand-gold/10 text-brand-gold"
        class="flex items-center p-3 rounded-xl hover:bg-white/5 transition-all group overflow-hidden whitespace-nowrap">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 min-w-[24px]" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        <span *ngIf="isSidebarOpen" class="ml-4 font-medium transition-opacity duration-300">Gallery</span>
      </a>

      <a routerLink="/admin/highlights" routerLinkActive="bg-brand-gold/10 text-brand-gold"
        class="flex items-center p-3 rounded-xl hover:bg-white/5 transition-all group overflow-hidden whitespace-nowrap">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 min-w-[24px]" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z" />
        </svg>
        <span *ngIf="isSidebarOpen" class="ml-4 font-medium transition-opacity duration-300">Highlights</span>
      </a>

      <a routerLink="/admin/reports" routerLinkActive="bg-brand-gold/10 text-brand-gold"
        class="flex items-center p-3 rounded-xl hover:bg-white/5 transition-all group overflow-hidden whitespace-nowrap">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 min-w-[24px]" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
        </svg>
        <span *ngIf="isSidebarOpen" class="ml-4 font-medium transition-opacity duration-300">Reports</span>
      </a>

      <div class="pt-10 border-t border-brand-gold/10 mt-6 sm:mt-10">
        <a routerLink="/admin/settings" routerLinkActive="bg-brand-gold/10 text-brand-gold"
          class="flex items-center p-3 rounded-xl hover:bg-white/5 transition-all group overflow-hidden whitespace-nowrap">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 min-w-[24px]" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37a1.724 1.724 0 002.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          <span *ngIf="isSidebarOpen" class="ml-4 font-medium transition-opacity duration-300">Settings</span>
        </a>

        <button (click)="logout()"
          class="w-full flex items-center p-3 rounded-xl hover:bg-red-500/10 text-red-400 transition-all group overflow-hidden whitespace-nowrap mt-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 min-w-[24px]" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          <span *ngIf="isSidebarOpen" class="ml-4 font-medium transition-opacity duration-300">Logout</span>
        </button>
      </div>

    </nav>
  </aside>

  <!-- Main Content Area -->
  <div class="flex-1 flex flex-col overflow-hidden">

    <!-- Top Navbar -->
    <header class="h-20 bg-white shadow-sm flex items-center justify-between px-8 relative z-20">
      <div class="flex items-center gap-4">
        <button (click)="toggleSidebar()"
          class="p-2 rounded-lg hover:bg-gray-100 transition-colors text-brand-chocolate">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <h2 class="text-xl font-heading font-bold text-brand-chocolate">Welcome, {{ adminName }}</h2>
      </div>

      <div class="flex items-center gap-6">
        <!-- Notification -->
        <button class="relative p-2 rounded-full hover:bg-gray-100 transition-colors text-gray-500">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
          </svg>
          <span class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 border-2 border-white rounded-full"></span>
        </button>

        <!-- Profile -->
        <div class="flex items-center gap-3">
          <div class="text-right hidden sm:block">
            <p class="text-sm font-bold text-brand-chocolate">{{ adminName }}</p>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest">Super Admin</p>
          </div>
          <div
            class="w-10 h-10 rounded-full bg-brand-gold/20 flex items-center justify-center text-brand-chocolate font-bold">
            {{ adminAvatar }}
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-8 bg-gray-50">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
