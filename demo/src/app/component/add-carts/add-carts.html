<section class="py-20 px-6 max-w-5xl mx-auto">
  <h2 class="text-3xl font-serif text-[#5B3D2D] mb-10 text-center">
    Your Cart
  </h2>

  <div *ngIf="cartItems.length === 0" class="text-center text-gray-500">
    Cart is empty
  </div>

  <div
    *ngFor="let item of cartItems"
    class="bg-white shadow-md rounded-xl p-6 mb-6"
  >
    <div class="flex justify-between items-center">
      <div>
        <h3 class="text-lg font-medium text-[#5B3D2D]">
          {{ item.name }}
        </h3>
        <p class="text-sm text-gray-600">
          {{ item.desc }}
        </p>
        <p class="text-sm mt-2">
          Qty: <strong>{{ item.qty }}</strong>
        </p>
      </div>

      <div class="text-right">
        <p class="text-sm text-gray-500">
          ₹{{ item.price }} × {{ item.qty }}
        </p>
        <p class="font-semibold text-[#7A1F1F] text-lg">
          ₹{{ item.totalPrice }}
        </p>
        <button
        (click)="removeItem(item.name)"
        class="mt-3 text-xs text-red-600 hover:underline"
      >
        Remove
      </button>
      </div>
      
    </div>
  </div>

  <!-- GRAND TOTAL -->
  <div
    *ngIf="cartItems.length > 0"
    class="mt-10 text-right text-xl font-semibold text-[#5B3D2D]"
  >
    Total Amount: ₹{{ grandTotal }}
  </div>

  <!-- BOOKING BUTTON -->
<div *ngIf="cartItems.length > 0" class="mt-8 text-right">
  <button
    (click)="processBooking()"
    class="px-10 py-3
           bg-[#5B3D2D] text-[#EED9A8]
           rounded-full text-sm
           hover:bg-[#4A2F22]
           transition">
    Proceed to Booking
  </button>
</div>

</section>
