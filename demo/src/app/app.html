<div class="bg-[#FAF7F4]">
  <!-- THE SUPREME LUXURY PRELOADER (Guaranteed Global Visibility) -->
  <div id="glamfit-preloader" *ngIf="isLoading()" [class.fade-out]="isClosing()">
    <div class="preloader-overlay"></div>
    <div class="preloader-center">
      <!-- Logo & Rings -->
      <div class="logo-wrapper">
        <div class="glow-sphere"></div>
        <div class="rotating-ring"></div>
        <div class="rotating-ring outer"></div>

        <!-- Particles -->
        <div class="particles-container">
          <div class="particle p1"></div>
          <div class="particle p2"></div>
          <div class="particle p3"></div>
          <div class="particle p4"></div>
          <div class="particle p5"></div>
          <div class="particle p6"></div>
        </div>

        <img src="logo/logo1.png" alt="GLAMFIT" class="preloader-logo">
        <div class="light-flare"></div>
      </div>

      <!-- Brand Text -->
      <div class="brand-reveal">
        <h1 class="brand-title">GLAMFIT</h1>
        <div class="elegant-divider">
          <span class="gold-line"></span>
          <span class="gold-diamond"></span>
          <span class="gold-line"></span>
        </div>
        <p class="brand-tagline">BEAUTY &bull; STYLE &bull; CONFIDENCE</p>
      </div>
    </div>
  </div>

  <app-navbar *ngIf="!isAdminPage"></app-navbar>
  <router-outlet></router-outlet>
  <app-social-media *ngIf="!isAdminPage"></app-social-media>
  <app-footer *ngIf="!isAdminPage"></app-footer>
</div>
